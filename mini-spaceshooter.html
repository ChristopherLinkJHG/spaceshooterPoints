<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Mini Space Shooter</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body{height:100%;margin:0;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif}
    #gameWrap{display:flex;align-items:center;justify-content:center;height:100%}
    canvas{background:#041025;box-shadow:0 0 30px rgba(0,0,0,0.6);border:3px solid #123}
    #hud{position:fixed;left:16px;top:16px;color:#fff}
    #controls{position:fixed;right:16px;top:16px;text-align:right}
    button{padding:8px 12px;background:#1a1a1a;border:1px solid #333;color:#fff;border-radius:6px}
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="c" width="360" height="600" tabindex="0"></canvas>
  </div>
  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>HP: <span id="hp">3</span></div>
  </div>
  <div id="controls">
    <div>Arrows = Move, Space = Fire</div>
    <div style="margin-top:8px"><button id="startBtn">Start / Restart</button></div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const scoreEl = document.getElementById('score');
  const hpEl = document.getElementById('hp');
  const startBtn = document.getElementById('startBtn');

  let last = 0;
  let running = false;
  let score = 0;

  // Player
  const Player = { x: W/2, y: H-60, w:22, h:28, speed:3.2, hp:3, cooldown:0 };

  let keys = {};
  let bullets = [];
  let enemies = [];
  let spawnTimer = 0;

  function reset(){
    Player.x = W/2; Player.y = H-60; Player.hp = 3; Player.cooldown = 0;
    bullets = []; enemies = []; spawnTimer = 0; score = 0; updateHud();
  }

  function updateHud(){ scoreEl.textContent = score; hpEl.textContent = Player.hp; }

  function spawnEnemy(){
    const ex = Math.random()*(W-40)+20;
    const speed = 0.6 + Math.random()*1.2;
    const hp = Math.random() < 0.15 ? 3 : 1; // some stronger enemies
    enemies.push({x:ex,y:-20,w:28,h:18,spd:speed,hp:hp});
  }

  function shoot(){
    if(Player.cooldown>0) return;
    bullets.push({x:Player.x,y:Player.y-18,vx:0,vy:-6,r:3,dmg:1});
    Player.cooldown = 12; // frames
  }

  function rectIntersect(a,b){
    return a.x - a.w/2 < b.x + b.w/2 && a.x + a.w/2 > b.x - b.w/2 && a.y - a.h/2 < b.y + b.h/2 && a.y + a.h/2 > b.y - b.h/2;
  }

  function update(dt){
    if(!running) return;
    // player movement
    if(keys.ArrowLeft) Player.x -= Player.speed;
    if(keys.ArrowRight) Player.x += Player.speed;
    if(keys.ArrowUp) Player.y -= Player.speed;
    if(keys.ArrowDown) Player.y += Player.speed;
    Player.x = Math.max(14, Math.min(W-14, Player.x));
    Player.y = Math.max(20, Math.min(H-20, Player.y));
    if(Player.cooldown>0) Player.cooldown--;

    // bullets
    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i]; b.x += b.vx; b.y += b.vy; if(b.y < -10) bullets.splice(i,1);
    }

    // enemiesSS
    spawnTimer += dt;
    if(spawnTimer > 700){ spawnTimer = 0; spawnEnemy(); }
    for(let i=enemies.length-1;i>=0;i--){
      const e = enemies[i]; e.y += e.spd;
      if(e.y > H+30) enemies.splice(i,1);
    }

    // collisions bullets->enemies
    for(let i=enemies.length-1;i>=0;i--){
      const e = enemies[i];
      for(let j=bullets.length-1;j>=0;j--){
        const b = bullets[j];
        if(Math.hypot(b.x - e.x, b.y - e.y) < 16){
          bullets.splice(j,1);
          e.hp -= b.dmg;
          if(e.hp <= 0){ enemies.splice(i,1); score += 100; }
          break;
        }
      }
    }

    // enemy->player collision
    for(let i=enemies.length-1;i>=0;i--){
      const e = enemies[i];
      if(Math.hypot(e.x - Player.x, e.y - Player.y) < 20){
        enemies.splice(i,1); Player.hp -= 1; if(Player.hp <= 0) running = false; updateHud();
      }
    }

    updateHud();
  }

  function draw(){
    // clear
    ctx.fillStyle = '#041025'; ctx.fillRect(0,0,W,H);
    // stars background
    for(let i=0;i<50;i++){ ctx.fillStyle = 'rgba(255,255,255,'+ (Math.random()*0.05+0.02) +')'; ctx.fillRect(Math.random()*W, Math.random()*H, 1,1); }

    // player
    ctx.save(); ctx.translate(Player.x, Player.y);
    // ship body
    ctx.fillStyle = '#7fe'; ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(10,10); ctx.lineTo(-10,10); ctx.closePath(); ctx.fill();
    // cockpit
    ctx.fillStyle = '#124'; ctx.beginPath(); ctx.ellipse(0,-2,4,3,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // bullets
    ctx.fillStyle = '#ffd'; for(const b of bullets) ctx.beginPath(), ctx.arc(b.x,b.y,b.r,0,Math.PI*2), ctx.fill();

    // enemies
    for(const e of enemies){
      ctx.save(); ctx.translate(e.x,e.y);
      ctx.fillStyle = e.hp>1 ? '#f66' : '#9af'; ctx.fillRect(-e.w/2,-e.h/2,e.w,e.h);
      ctx.fillStyle = '#000'; ctx.fillRect(-6,-2,12,4);
      ctx.restore();
    }

    if(!running){
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#fff'; ctx.font = '20px Arial'; ctx.textAlign='center';
      ctx.fillText('Mini Space Shooter', W/2, H/2 - 20);
      ctx.fillText('Press Start to play', W/2, H/2 + 10);
    }
  }

  function loop(ts){
    if(!last) last = ts; const dt = ts - last; last = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // input
  window.addEventListener('keydown', e=>{
    if(e.code==='Space'){ e.preventDefault(); shoot(); }
    keys[e.key] = true; keys[e.code] = true;
  });
  window.addEventListener('keyup', e=>{ keys[e.key] = false; keys[e.code] = false; });

  startBtn.addEventListener('click', ()=>{ reset(); running = true; last = 0; requestAnimationFrame(loop); });

  // start loop inactive until user presses Start
  draw();
})();
</script>
</body>
</html>
